<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ChatCommunity - Social Chat App</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/socket.io/4.7.2/socket.io.js"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            height: 100vh;
            overflow: hidden;
        }

        /* Modal Styles */
        .modal {
            display: flex;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.8);
            z-index: 1000;
            align-items: center;
            justify-content: center;
        }

        .modal-content {
            background: white;
            padding: 2rem;
            border-radius: 20px;
            width: 90%;
            max-width: 400px;
            position: relative;
            animation: modalSlide 0.3s ease;
        }

        @keyframes modalSlide {
            from { transform: translateY(-50px); opacity: 0; }
            to { transform: translateY(0); opacity: 1; }
        }

        .close {
            position: absolute;
            right: 20px;
            top: 15px;
            font-size: 28px;
            cursor: pointer;
            color: #999;
        }

        .tab-container {
            display: flex;
            margin-bottom: 1.5rem;
            border-bottom: 2px solid #eee;
        }

        .tab-btn {
            flex: 1;
            padding: 12px;
            border: none;
            background: none;
            font-size: 16px;
            cursor: pointer;
            transition: all 0.3s;
        }

        .tab-btn.active {
            color: #667eea;
            border-bottom: 3px solid #667eea;
        }

        .auth-form {
            display: none;
        }

        .auth-form.active {
            display: block;
        }

        .auth-form input {
            width: 100%;
            padding: 15px;
            margin-bottom: 1rem;
            border: 2px solid #eee;
            border-radius: 12px;
            font-size: 16px;
            transition: border-color 0.3s;
        }

        .auth-form input:focus {
            outline: none;
            border-color: #667eea;
        }

        .auth-form button {
            width: 100%;
            padding: 15px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 12px;
            font-size: 16px;
            cursor: pointer;
            transition: transform 0.2s;
        }

        .auth-form button:hover {
            transform: translateY(-2px);
        }

        /* App Layout */
        .app-container {
            height: 100vh;
            display: flex;
            flex-direction: column;
        }

        .header {
            background: rgba(255,255,255,0.95);
            backdrop-filter: blur(20px);
            padding: 1rem 2rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
            box-shadow: 0 8px 32px rgba(0,0,0,0.1);
        }

        .header-left h1 {
            color: #333;
            margin-left: 10px;
        }

        .header-right {
            display: flex;
            align-items: center;
            gap: 20px;
        }

        .notifications {
            position: relative;
            cursor: pointer;
            padding: 10px;
        }

        .notif-badge {
            position: absolute;
            top: 5px;
            right: 5px;
            background: #ff4757;
            color: white;
            border-radius: 50%;
            width: 20px;
            height: 20px;
            font-size: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .user-profile {
            display: flex;
            align-items: center;
            gap: 10px;
            cursor: pointer;
            padding: 10px;
            border-radius: 25px;
            transition: background 0.3s;
        }

        .user-profile:hover {
            background: rgba(0,0,0,0.1);
        }

        .user-profile img {
            width: 40px;
            height: 40px;
            border-radius: 50%;
        }

        .profile-dropdown {
            position: absolute;
            top: 70px;
            right: 20px;
            background: white;
            border-radius: 15px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.15);
            padding: 1rem;
            width: 250px;
            display: none;
            z-index: 100;
        }

        .profile-dropdown.show {
            display: block;
        }

        .profile-info {
            display: flex;
            align-items: center;
            gap: 15px;
            margin-bottom: 1rem;
            padding-bottom: 1rem;
            border-bottom: 1px solid #eee;
        }

        .profile-info img {
            width: 60px;
            height: 60px;
            border-radius: 50%;
        }

        .profile-dropdown button {
            width: 100%;
            padding: 12px;
            background: #ff4757;
            color: white;
            border: none;
            border-radius: 10px;
            cursor: pointer;
        }

        /* Main Content */
        .main-content {
            flex: 1;
            display: flex;
            overflow: hidden;
        }

        /* Sidebar - Friends */
        .sidebar {
            width: 300px;
            background: rgba(255,255,255,0.95);
            backdrop-filter: blur(20px);
            padding: 2rem 1.5rem;
            overflow-y: auto;
            border-right: 1px solid rgba(0,0,0,0.1);
        }

        .sidebar-section h3 {
            margin-bottom: 1rem;
            color: #333;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .search-friends {
            margin-bottom: 1.5rem;
        }

        .search-friends input {
            width: 100%;
            padding: 12px 15px;
            border: 2px solid #eee;
            border-radius: 25px;
            font-size: 14px;
        }

        .friends-list {
            max-height: 400px;
            overflow-y: auto;
            margin-bottom: 1.5rem;
        }

        .friend-item {
            display: flex;
            align-items: center;
            gap: 15px;
            padding: 12px;
            border-radius: 15px;
            cursor: pointer;
            transition: background 0.3s;
            margin-bottom: 10px;
        }

        .friend-item:hover, .friend-item.active {
            background: rgba(102, 126, 234, 0.1);
        }

        .friend-item.online .status {
            background: #2ed573;
        }

        .friend-item img {
            width: 50px;
            height: 50px;
            border-radius: 50%;
        }

        .friend-info h4 {
            font-size: 16px;
            margin-bottom: 5px;
        }

        .status {
            width: 10px;
            height: 10px;
            border-radius: 50%;
            background: #ddd;
            margin-left: auto;
        }

        .add-friend-btn {
            width: 100%;
            padding: 12px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 25px;
            cursor: pointer;
            font-size: 14px;
        }

        /* Feed Section */
        .feed-section {
            flex: 1;
            max-width: 600px;
            overflow-y: auto;
            padding: 2rem;
        }

        .create-post {
            background: rgba(255,255,255,0.95);
            backdrop-filter: blur(20px);
            padding: 1.5rem;
            border-radius: 20px;
            margin-bottom: 2rem;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
        }

        .post-input {
            display: flex;
            align-items: center;
            gap: 15px;
            margin-bottom: 1rem;
        }

        .post-input img {
            width: 45px;
            height: 45px;
            border-radius: 50%;
        }

        .post-input input {
            flex: 1;
            padding: 15px;
            border: 2px solid #eee;
            border-radius: 25px;
            font-size: 16px;
        }

        .post-actions {
            display: flex;
            align-items: center;
            gap: 15px;
        }

        .file-upload {
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 12px 20px;
            background: #f8f9fa;
            border-radius: 25px;
            cursor: pointer;
            transition: background 0.3s;
        }

        .file-upload:hover {
            background: #e9ecef;
        }

        .file-upload input {
            display: none;
        }

        .post-actions button {
            padding: 12px 25px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 25px;
            cursor: pointer;
            font-weight: 600;
        }

        /* Posts */
        .post {
            background: rgba(255,255,255,0.95);
            backdrop-filter: blur(20px);
            padding: 1.5rem;
            border-radius: 20px;
            margin-bottom: 1.5rem;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
        }

        .post-header {
            display: flex;
            align-items: center;
            gap: 15px;
            margin-bottom: 1rem;
        }

        .post-header img {
            width: 45px;
            height: 45px;
            border-radius: 50%;
        }

        .post-header h4 {
            font-size: 16px;
            color: #333;
        }

        .post-header span {
            color: #666;
            font-size: 14px;
        }

        .post-content {
            margin-bottom: 1rem;
            font-size: 16px;
            line-height: 1.5;
        }

        .post-video {
            width: 100%;
            max-width: 500px;
            height: 300px;
            object-fit: cover;
            border-radius: 15px;
            margin: 1rem 0;
        }

        .post-actions {
            display: flex;
            gap: 20px;
        }

        .post-action {
            display: flex;
            align-items: center;
            gap: 8px;
            padding: 8px 15px;
            background: #f8f9fa;
            border-radius: 20px;
            cursor: pointer;
            transition: background 0.3s;
        }

        .post-action:hover {
            background: #e9ecef;
        }

        /* Chat Section */
        .chat-section {
            width: 350px;
            background: rgba(255,255,255,0.95);
            backdrop-filter: blur(20px);
            display: flex;
            flex-direction: column;
            border-left: 1px solid rgba(0,0,0,0.1);
        }

        .chat-header {
            padding: 1.5rem;
            border-bottom: 1px solid #eee;
        }

        .chat-list {
            flex: 1;
            overflow-y: auto;
            padding: 1rem;
        }

        .chat-item {
            display: flex;
            align-items: center;
            gap: 15px;
            padding: 12px;
            border-radius: 15px;
            cursor: pointer;
            transition: background 0.3s;
            margin-bottom: 10px;
        }

        .chat-item:hover, .chat-item.active {
            background: rgba(102, 126, 234, 0.1);
        }

        .chat-item img {
            width: 50px;
            height: 50px;
            border-radius: 50%;
        }

        .active-chat {
            flex: 1;
            display: flex;
            flex-direction: column;
        }

        .chat-partner {
            padding: 1rem 1.5rem;
            border-bottom: 1px solid #eee;
            display: flex;
            align-items: center;
            gap: 15px;
        }

        .chat-partner img {
            width: 50px;
            height: 50px;
            border-radius: 50%;
        }

        .chat-messages {
            flex: 1;
            padding: 1rem;
            overflow-y: auto;
        }

        .message {
            margin-bottom: 1rem;
            display: flex;
            align-items: flex-end;
            gap: 10px;
        }

        .message.sent {
            justify-content: flex-end;
        }

        .message-bubble {
            max-width: 70%;
            padding: 12px 18px;
            border-radius: 20px;
            position: relative;
        }

        .message.sent .message-bubble {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
        }

        .message.received .message-bubble {
            background: #f1f3f4;
            color: #333;
        }

        .chat-input {
            padding: 1rem 1.5rem;
            border-top: 1px solid #eee;
            display: flex;
            gap: 10px;
        }

        .chat-input input {
            flex: 1;
            padding: 12px 18px;
            border: 2px solid #eee;
            border-radius: 25px;
            font-size: 14px;
        }

        .chat-input button {
            width: 45px;
            height: 45px;
            border: none;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border-radius: 50%;
            cursor: pointer;
        }

        /* Responsive */
        @media (max-width: 768px) {
            .sidebar, .chat-section {
                display: none;
            }
            
            .feed-section {
                max-width: none;
                padding: 1rem;
            }
        }

        /* Scrollbar */
        ::-webkit-scrollbar {
            width: 6px;
        }

        ::-webkit-scrollbar-track {
            background: #f1f1f1;
        }

        ::-webkit-scrollbar-thumb {
            background: #667eea;
            border-radius: 3px;
        }
    </style>
</head>
<body>
    <!-- Login/Register Modal -->
    <div id="authModal" class="modal">
        <div class="modal-content">
            <span class="close" onclick="closeModal()">&times;</span>
            <div class="tab-container">
                <button class="tab-btn active" onclick="switchTab('login')">Login</button>
                <button class="tab-btn" onclick="switchTab('register')">Register</button>
            </div>
            
            <!-- Login Form -->
            <form id="loginForm" class="auth-form active">
                <input type="email" id="loginEmail" placeholder="Email" required>
                <input type="password" id="loginPassword" placeholder="Password" required>
                <button type="submit">Login</button>
            </form>
            
            <!-- Register Form -->
            <form id="registerForm" class="auth-form">
                <input type="text" id="regUsername" placeholder="Username" required>
                <input type="email" id="regEmail" placeholder="Email" required>
                <input type="password" id="regPassword" placeholder="Password" required>
                <button type="submit">Register</button>
            </form>
        </div>
    </div>

    <!-- Main App (Hidden until login) -->
    <div id="mainApp" class="app-container" style="display: none;">
        <!-- Header -->
        <header class="header">
            <div class="header-left">
                <i class="fas fa-comments" style="color: #667eea; font-size: 24px;"></i>
                <h1>ChatCommunity</h1>
            </div>
            <div class="header-right">
                <div class="notifications">
                    <i class="fas fa-bell" style="font-size: 20px; color: #333;"></i>
                    <span class="notif-badge">3</span>
                </div>
                <div class="user-profile" onclick="toggleProfile()">
                    <img id="profileImg" src="https://via.placeholder.com/40/667eea/ffffff?text=U" alt="Profile">
                    <span id="userName">User</span>
                </div>
            </div>
        </header>

        <!-- Profile Dropdown -->
        <div id="profileDropdown" class="profile-dropdown">
            <div class="profile-info">
                <img id="profileImgDrop" src="https://via.placeholder.com/60/667eea/ffffff?text=U" alt="Profile">
                <div>
                    <h4 id="profileName">User</h4>
                    <p id="profileEmail">user@example.com</p>
                </div>
            </div>
            <button onclick="logout()">Logout</
