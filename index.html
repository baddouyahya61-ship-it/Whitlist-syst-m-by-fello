<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Whitelist</title>

<style>
body {
  background: #0b0c0e;
  color: white;
  font-family: Arial;
  text-align: center;
}

.container {
  max-width: 500px;
  margin: auto;
  padding: 20px;
}

input, textarea {
  width: 100%;
  margin: 10px 0;
  padding: 10px;
  background: #111;
  border: 1px solid #333;
  color: white;
}

button {
  padding: 15px;
  width: 100%;
  background: orange;
  border: none;
  cursor: pointer;
}

.success {
  display: none;
  color: lightgreen;
  margin-top: 10px;
}
</style>
</head>

<body>

<div class="container">
  <h1>Whitelist</h1>

  <input id="nomIRL" placeholder="Nom IRL">
  <input id="discord" placeholder="Discord">
  <input id="ageIRL" placeholder="Age IRL">
  <input id="nomRP" placeholder="Nom RP">
  <input id="ageRP" placeholder="Age RP">
  <textarea id="experience" placeholder="Experience"></textarea>

  <button onclick="send()">Send Application</button>

  <div class="success" id="msg">✅ Application Sent</div>
</div>

<script>
async function send() {

  const data = {
    nomIRL: document.getElementById("nomIRL").value,
    discord: document.getElementById("discord").value,
    ageIRL: document.getElementById("ageIRL").value,
    nomRP: document.getElementById("nomRP").value,
    ageRP: document.getElementById("ageRP").value,
    experience: document.getElementById("experience").value
  };

  await fetch("https://baddouyahya61-ship-it.github.io/Whitlist-syst-m-by-fello//send", { // بدلها بالرابط ديالك
    method: "POST",
    headers: {
      "Content-Type": "application/json"
    },
    body: JSON.stringify(data)
  });

  document.getElementById("msg").style.display = "block";
}
</script>

</body>
</html>
