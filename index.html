<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Whitelist Systeme - Dragon Style</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Unica+One&display=swap');

  body {
    margin: 0;
    background: radial-gradient(circle at center, #1a0c00 0%, #000000 90%);
    font-family: 'Unica One', cursive, sans-serif;
    color: #f0d8a8;
  }

  .container {
    max-width: 900px;
    margin: 50px auto;
    background: linear-gradient(145deg, #350d00, #5a1f00);
    border-radius: 20px;
    box-shadow: 0 0 20px 6px rgba(243, 115, 0, 0.6), inset 0 0 25px 2px #ff7b00;
    padding: 40px 50px 60px;
  }

  .logo-dragon {
    display: block;
    margin: 0 auto 25px;
    width: 80px;
    height: 80px;
    fill: #ff6600;
    filter: drop-shadow(0 0 6px #ff4400);
    animation: flickerGlow 3s infinite alternate;
  }

  @keyframes flickerGlow {
    0% { filter: drop-shadow(0 0 6px #ff4400); }
    50% { filter: drop-shadow(0 0 12px #ffcc33); }
    100% { filter: drop-shadow(0 0 8px #ff7700); }
  }

  h1 {
    margin: 0 0 10px;
    text-align: center;
    color: #ffcc33;
    text-shadow: 0 0 8px #e67a00, 0 0 20px #ff5700, 0 0 30px #ff2200;
    font-size: 3rem;
    letter-spacing: 4px;
    font-weight: 900;
  }

  .subtitle {
    text-align: center;
    font-style: italic;
    font-size: 14px;
    margin-bottom: 40px;
    color: #cc7a00;
    text-shadow: 0 0 6px #ff7700;
  }

  .form-section {
    display: flex;
    justify-content: space-between;
    margin-bottom: 40px;
    gap: 30px;
  }

  .form-group {
    flex: 1;
  }

  .section-title {
    font-size: 16px;
    font-weight: 900;
    margin-bottom: 20px;
    text-transform: uppercase;
    letter-spacing: 2px;
  }
  .section-personal { color: #ff6e00; text-shadow: 0 0 6px #ffb347; }
  .section-character { color: #ff3300; text-shadow: 0 0 7px #ff5a3c; }
  .section-experience { color: #ffa500; text-shadow: 0 0 8px #ffd200; }

  label {
    display: block;
    font-size: 14px;
    margin-bottom: 6px;
    color: #f9cca2;
  }

  input[type="text"], input[type="number"], textarea {
    width: 100%;
    background: #2e0e00;
    border: 2px solid #6a2e00;
    border-radius: 10px;
    color: #f6db95;
    padding: 12px 15px;
    font-size: 16px;
    box-shadow: inset 2px 2px 10px #5a2000;
    transition: all 0.3s ease;
    resize: vertical;
    font-family: 'Unica One', cursive;
  }

  input[type="text"]:focus, input[type="number"]:focus, textarea:focus {
    outline: none;
    border-color: #ff7000;
    box-shadow: 0 0 14px #ff7f00;
  }

  input::placeholder, textarea::placeholder {
    color: #a06020;
  }

  hr {
    border: none;
    border-top: 1.5px solid #6a2e00;
    margin: 20px 0 40px;
    box-shadow: 0 0 10px #ff6600;
  }

  .send-button {
    width: 100%;
    background: linear-gradient(45deg, #ff4400, #ff7700);
    border: none;
    border-radius: 12px;
    color: #fff;
    padding: 18px;
    font-size: 22px;
    font-weight: 900;
    font-family: 'Unica One', cursive;
    text-transform: uppercase;
    cursor: pointer;
    box-shadow: 0 0 25px rgba(255, 102, 0, 0.8);
    transition: all 0.3s ease;
  }

  .send-button:hover {
    transform: scale(1.02);
    box-shadow: 0 0 35px rgba(255, 102, 0, 1);
  }

  .send-button.sending {
    background: #666;
    cursor: not-allowed;
  }

  .success-message {
    display: none;
    text-align: center;
    background: linear-gradient(45deg, #00ff44, #44ff88);
    color: #000;
    padding: 25px;
    border-radius: 12px;
    margin-top: 20px;
    font-size: 24px;
    font-weight: 900;
    animation: pulse 1s infinite;
  }

  @keyframes pulse {
    0%, 100% { transform: scale(1); }
    50% { transform: scale(1.05); }
  }

  @media (max-width: 720px) {
    .form-section { flex-direction: column; }
  }
</style>
</head>
<body>

<div class="container">
  <svg class="logo-dragon" viewBox="0 0 64 64">
    <path d="M32 2L27 22H15l15 20-10 10 5-20 10-10H48z"/>
  </svg>

  <h1>WHITELIST SYSTEME</h1>
  <p class="subtitle">SYSTEME CREATED BY SPENDOZA</p>

  <div class="form-section">
    <div class="form-group">
      <h2 class="section-title section-personal">PERSONNAL INFO (IRL)</h2>
      <label>Nom IRL</label>
      <input type="text" id="name-irl" placeholder="Votre nom réel" required>
      
      <label>Discord</label>
      <input type="text" id="discord" placeholder="user#1234" required>
      
      <label>Âge IRL</label>
      <input type="number" id="age-irl" placeholder="Votre âge" min="13" required>
    </div>

    <div class="form-group">
      <h2 class="section-title section-character">CHARACTER INFO (RP)</h2>
      <label>Nom RP</label>
      <input type="text" id="name-rp" placeholder="Prénom_Nom" required>
      
      <label>Âge RP</label>
      <input type="number" id="age-rp" placeholder="Âge du personnage" min="16" required>
    </div>
  </div>

  <hr />

  <div class="form-group">
    <h2 class="section-title section-experience">EXPERIENCE & BACKGROUND</h2>
    <label>Describe your experience and background</label>
    <textarea id="experience" rows="6" placeholder="Votre expérience..." required></textarea>
  </div>

  <button class="send-button" onclick="sendApplication()">
    🔥 ENVOYER LA CANDIDATURE 🔥
  </button>

  <div class="success-message" id="successMessage">
    ✅ CANDIDATURE ENVOYÉE !<br>
    <small>Les boutons Accept/Refuse sont dans Discord</small>
  </div>
</div>

<script>
// === WEBHOOK DISCORD ===
const WEBHOOK_URL = 'https://discord.com/api/webhooks/1449361776692166666/d1gtPo3Td4IQhuJVCrBEs6Zr62V7AkM2kewCPeXDWUl45iTCXaeN_CFPD1Bm-IXCfMGo';
const ROLE_ID = '1402687620219404348';
let appCounter = 0;

async function sendApplication() {
  const btn = document.querySelector('.send-button');
  const success = document.getElementById('successMessage');
  
  const data = {
    nameIRL: document.getElementById('name-irl').value,
    discord: document.getElementById('discord').value,
    ageIRL: document.getElementById('age-irl').value,
    nameRP: document.getElementById('name-rp').value,
    ageRP: document.getElementById('age-rp').value,
    experience: document.getElementById('experience').value,
    id: ++appCounter,
    timestamp: new Date().toLocaleString('fr-FR')
  };

  if (!data.nameIRL || !data.discord || !data.experience) {
    alert('⚠️ Remplissez tous les champs !');
    return;
  }

  btn.textContent = '⏳ ENVOI...';
  btn.classList.add('sending');
  btn.disabled = true;

  try {
    const response = await fetch(WEBHOOK_URL, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        username: '🐉 Whitelist Bot',
        embeds: [{
          title: `🆕 Candidature #${data.id}`,
          description: `**Discord:** \`${data.discord}\``,
          color: 16711680,
          fields: [
            { name: '👤 Nom IRL', value: `\`${data.nameIRL}\``, inline: true },
            { name: '📅 Âge IRL', value: `\`${data.ageIRL}\``, inline: true },
            { name: '🎭 Nom RP', value: `\`${data.nameRP}\``, inline: true },
            { name: '🎭 Âge RP', value: `\`${data.ageRP}\``, inline: true },
            { name: '📝 Expérience', value: `\`\`\`${data.experience.slice(0, 900)}\`\`\``, inline: false }
          ],
          footer: { text: data.timestamp }
        }],
        components: [{
          type: 1,
          components: [
            {
              type: 2,
              style: 3, // VERT ✅
              label: 'ACCEPT',
              custom_id: `accept_${data.id}_${data.discord}`,
              emoji: '✅'
            },
            {
              type: 2,
              style: 4, // ROUGE ❌
              label: 'REFUSE',
              custom_id: `refuse_${data.id}_${data.discord}`,
              emoji: '❌'
            }
          ]
        }]
      })
    });

    if (response.ok) {
      success.style.display = 'block';
      btn.style.display = 'none';
      document.querySelectorAll('input, textarea').forEach(el => el.value = '');
    }
  } catch (e) {
    alert('❌ Erreur !');
  } finally {
    btn.textContent = '🔥 ENVOYER LA CANDIDATURE 🔥';
    btn.classList.remove('sending');
    btn.disabled = false;
  }
}
</script>

</body>
</html>
