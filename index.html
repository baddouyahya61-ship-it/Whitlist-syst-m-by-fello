<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Whitelist Systeme - Dragon Style</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Unica+One&display=swap');

  /* Fond avec texture sombre style écailles dragon */
  body {
    margin: 0;
    background: radial-gradient(circle at center, #1a0c00 0%, #000000 90%);
    font-family: 'Unica One', cursive, sans-serif;
    color: #f0d8a8;
    -webkit-font-smoothing: antialiased;
  }

  /* Conteneur principal */
  .container {
    max-width: 900px;
    margin: 50px auto;
    background: linear-gradient(145deg, #350d00, #5a1f00);
    border-radius: 20px;
    box-shadow:
      0 0 20px 6px rgba(243, 115, 0, 0.6),
      inset 0 0 25px 2px #ff7b00;
    padding: 40px 50px 60px;
    position: relative;
    overflow: hidden;
  }

  /* Logo dragon */
  .logo-dragon {
    display: block;
    margin: 0 auto 25px;
    width: 80px;
    height: 80px;
    fill: #ff6600;
    filter: drop-shadow(0 0 6px #ff4400);
    animation: flickerGlow 3s infinite alternate;
  }

  @keyframes flickerGlow {
    0% { filter: drop-shadow(0 0 6px #ff4400); }
    50% { filter: drop-shadow(0 0 12px #ffcc33); }
    100% { filter: drop-shadow(0 0 8px #ff7700); }
  }

  /* Titre principal */
  h1 {
    margin: 0 0 10px;
    text-align: center;
    color: #ffcc33;
    text-shadow:
      0 0 8px #e67a00,
      0 0 20px #ff5700,
      0 0 30px #ff2200;
    font-size: 3rem;
    letter-spacing: 4px;
    font-weight: 900;
  }

  .subtitle {
    text-align: center;
    font-style: italic;
    font-size: 14px;
    margin-bottom: 40px;
    color: #cc7a00;
    text-shadow: 0 0 6px #ff7700;
  }

  /* Sections du formulaire */
  .form-section {
    display: flex;
    justify-content: space-between;
    margin-bottom: 40px;
    gap: 30px;
  }

  .form-group {
    flex: 1;
  }

  .section-title {
    font-size: 16px;
    font-weight: 900;
    margin-bottom: 20px;
    text-transform: uppercase;
    letter-spacing: 2px;
    user-select: none;
  }
  .section-personal { color: #ff6e00; text-shadow: 0 0 6px #ffb347; }
  .section-character { color: #ff3300; text-shadow: 0 0 7px #ff5a3c; }
  .section-experience { color: #ffa500; text-shadow: 0 0 8px #ffd200; }

  label {
    display: block;
    font-size: 14px;
    margin-bottom: 6px;
    color: #f9cca2;
    text-shadow: 1px 1px 2px #400d00;
  }

  input[type="text"],
  input[type="number"],
  textarea {
    width: 100%;
    background: #2e0e00;
    border: 2px solid #6a2e00;
    border-radius: 10px;
    color: #f6db95;
    padding: 12px 15px;
    font-size: 16px;
    box-shadow: inset 2px 2px 10px #5a2000;
    transition: border-color 0.3s ease-in-out, box-shadow 0.3s ease;
    resize: vertical;
    font-family: 'Unica One', cursive, sans-serif;
    letter-spacing: 0.03em;
  }

  input[type="text"]::placeholder,
  input[type="number"]::placeholder,
  textarea::placeholder {
    color: #a06020;
    font-style: italic;
  }

  input[type="text"]:focus,
  input[type="number"]:focus,
  textarea:focus {
    outline: none;
    border-color: #ff7000;
    box-shadow: 0 0 14px #ff7f00, inset 2px 2px 15px #ff8b00;
    background: #3a1b00;
    color: #fff0cc;
  }

  hr {
    border: none;
    border-top: 1.5px solid #6a2e00;
    margin: 20px 0 40px;
    box-shadow: 0 0 10px #ff6600;
  }

  /* BOUTON SEND */
  .send-button {
    width: 100%;
    background: linear-gradient(45deg, #ff4400, #ff7700, #ffaa00);
    border: none;
    border-radius: 12px;
    color: #fff;
    padding: 16px 30px;
    font-size: 20px;
    font-weight: 900;
    font-family: 'Unica One', cursive;
    text-transform: uppercase;
    letter-spacing: 2px;
    cursor: pointer;
    box-shadow:
      0 0 20px rgba(255, 102, 0, 0.8),
      inset 0 0 10px rgba(255, 255, 255, 0.2);
    transition: all 0.3s ease;
    position: relative;
    overflow: hidden;
  }

  .send-button:hover {
    transform: translateY(-2px);
    box-shadow:
      0 8px 25px rgba(255, 102, 0, 0.9),
      inset 0 0 15px rgba(255, 255, 255, 0.3);
  }

  .send-button:active {
    transform: translateY(0);
  }

  .send-button.sending {
    background: linear-gradient(45deg, #666, #888);
    cursor: not-allowed;
  }

  /* Message de confirmation */
  .success-message {
    display: none;
    text-align: center;
    background: linear-gradient(45deg, #00ff44, #44ff88);
    color: #000;
    padding: 20px;
    border-radius: 12px;
    margin-top: 20px;
    font-size: 22px;
    font-weight: 900;
    text-shadow: none;
    box-shadow: 0 0 20px rgba(0, 255, 68, 0.6);
    animation: pulse 1s infinite;
  }

  @keyframes pulse {
    0%, 100% { transform: scale(1); }
    50% { transform: scale(1.05); }
  }

  /* Responsive */
  @media (max-width: 720px) {
    .form-section { flex-direction: column; }
    .container { padding: 30px 20px 40px; }
  }
</style>
</head>
<body>

  <div class="container">
    <!-- Logo Dragon -->
    <svg class="logo-dragon" viewBox="0 0 64 64" xmlns="http://www.w3.org/2000/svg">
      <path d="M32 2L27 22H15l15 20-10 10 5-20 10-10H48z"/>
    </svg>

    <h1>WHITELIST SYSTEME</h1>
    <p class="subtitle">SYSTEME CREATED BY SPENDOZA</p>

    <div class="form-section">
      <div class="form-group">
        <h2 class="section-title section-personal">PERSONNAL INFO (IRL)</h2>
        <label for="name-irl">Name IRL</label>
        <input type="text" id="name-irl" placeholder="Your real name" required />

        <label for="discord">Discord Username</label>
        <input type="text" id="discord" placeholder="example#0000" required />

        <label for="age-irl">Age IRL</label>
        <input type="number" id="age-irl" placeholder="Your real age" min="13" required />
      </div>

      <div class="form-group">
        <h2 class="section-title section-character">CHARACTER INFO (RP)</h2>
        <label for="name-rp">Name RP</label>
        <input type="text" id="name-rp" placeholder="Firstname_Lastname" required />

        <label for="age-rp">Age RP</label>
        <input type="number" id="age-rp" placeholder="Character age" min="16" required />
      </div>
    </div>

    <hr />

    <div class="form-group">
      <h2 class="section-title section-experience">EXPERIENCE & BACKGROUND</h2>
      <label for="experience">Describe your experience and background</label>
      <textarea id="experience" rows="6" placeholder="Your text here..." required></textarea>
    </div>

    <!-- BOUTON SEND -->
    <button class="send-button" onclick="sendApplication()">
      🔥 SEND APPLICATION 🔥
    </button>

    <!-- Message de confirmation -->
    <div class="success-message" id="successMessage">
      ✅ APPLICATION SENT ✅
    </div>
  </div>

<script>
// === VOTRE WEBHOOK DISCORD ✅ ===
const DISCORD_WEBHOOK_URL = 'https://discord.com/api/webhooks/1449361776692166666/d1gtPo3Td4IQhuJVCrBEs6Zr62V7AkM2kewCPeXDWUl45iTCXaeN_CFPD1Bm-IXCfMGo';

// ID DU RÔLE AVEC PERMISSION (SEUL CE RÔLE PEUT UTILISER LES BOUTONS)
const PERMISSION_ROLE_ID = '1402687620219404348';

let applicationId = 0; // Compteur unique pour chaque candidature

async function sendApplication() {
  const button = document.querySelector('.send-button');
  const successMsg = document.getElementById('successMessage');

  // Récupérer les données du formulaire
  const formData = {
    nameIRL: document.getElementById('name-irl').value,
    discord: document.getElementById('discord').value,
    ageIRL: document.getElementById('age-irl').value,
    nameRP: document.getElementById('name-rp').value,
    ageRP: document.getElementById('age-rp').value,
    experience: document.getElementById('experience').value,
    timestamp: new Date().toLocaleString('fr-FR'),
    appId: ++applicationId // ID unique pour chaque candidature
  };

  // Vérifier que tous les champs sont remplis
  if (!formData.nameIRL || !formData.discord || !formData.ageIRL || 
      !formData.nameRP || !formData.ageRP || !formData.experience) {
    alert('⚠️ Remplissez tous les champs avant d\'envoyer !');
    return;
  }

  // Désactiver le bouton
  button.textContent = '⏳ ENVOI EN COURS...';
  button.classList.add('sending');
  button.disabled = true;

  try {
    // Envoyer vers Discord avec BOUTONS Accept/Refuse
    const response = await fetch(DISCORD_WEBHOOK_URL, {
      method: 'POST',
      headers: {
        'Content-Type': 'application/json',
      },
      body: JSON.stringify({
        username: '🐉 Whitelist Dragon Bot',
        avatar_url: 'https://cdn.discordapp.com/emojis/123456789.png',
        embeds: [{
          title: `🆕 CANDIDATURE #${formData.appId}`,
          description: `**Discord:** \`${formData.discord}\``,
          color: 0xFF6600,
          fields: [
            { name: '👤 Nom IRL', value: `\`${formData.nameIRL}\``, inline: true },
            { name: '📅 Âge IRL', value: `\`${formData.ageIRL} ans\``, inline: true },
            { name: '🎭 Nom RP', value: `\`${formData.nameRP}\``, inline: true },
            { name: '🎭 Âge RP', value: `\`${formData.ageRP} ans\``, inline: true },
            { name: '📝 Expérience', value: `\`\`\`${formData.experience.substring(0, 900)}\`\`\``, inline: false }
          ],
          footer: {
            text: `📅 ${formData.timestamp} | Cliquez Accept/Refuse`
          },
          thumbnail: {
            url: 'https://cdn.discordapp.com/emojis/123456789.png'
          }
        }],
        components: [
          {
            type: 1, // Action Row
            components: [
              {
                type: 2, // Button
                style: 3, // Green = Accept
                label: '✅ ACCEPT',
                custom_id: `accept_${formData.appId}_${formData.discord}`,
                emoji: { name: '✅' }
              },
              {
                type: 2, // Button
                style: 4, // Red = Refuse
                label: '❌ REFUSE',
                custom_id: `refuse_${formData.appId}_${formData.discord}`,
                emoji: { name: '❌' }
              }
            ]
          }
        ]
      })
    });

    if (response.ok) {
      // Afficher le message de succès
      successMsg.innerHTML = `✅ APPLICATION #${formData.appId} ENVOYÉE !<br><small>Les boutons Accept/Refuse sont dans Discord</small>`;
      successMsg.style.display = 'block';
      button.style.display = 'none';
      
      // Réinitialiser le formulaire
      document.querySelectorAll('input, textarea').forEach(input => input.value = '');
    } else {
      throw new Error('Erreur webhook Discord');
    }
  } catch (error) {
    alert('❌ Erreur d\'envoi. Réessayez !');
    console.error('Error:', error);
  } finally {
    // Réactiver le bouton
    button.textContent = '🔥 SEND APPLICATION 🔥';
    button.classList.remove('sending');
    button.disabled = false;
  }
}
</script>

</body>
</html>
